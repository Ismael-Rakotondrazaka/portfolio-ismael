name: Deploy Portfolio

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1. Get code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build and push image
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ vars.APP_VERSION }}
            NUXT_SITE_URL=${{ vars.NUXT_SITE_URL }}
            NUXT_PUBLIC_SITE_URL=${{ vars.NUXT_PUBLIC_SITE_URL }}
            NUXT_PUBLIC_APP_VERSION=${{ vars.NUXT_PUBLIC_APP_VERSION }}
            NUXT_PUBLIC_SCRIPTS_GOOGLE_RECAPTCHA_SITE_KEY=${{ vars.NUXT_PUBLIC_SCRIPTS_GOOGLE_RECAPTCHA_SITE_KEY }}
          tags: |
            ghcr.io/ismael-rakotondrazaka/portfolio-ismael:latest
            ghcr.io/ismael-rakotondrazaka/portfolio-ismael:${{ github.sha }}

      # 4. Trigger boot repo deploy
      - name: Trigger Boot Deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.BOOT_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/${{ vars.BOOT_REPO }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
